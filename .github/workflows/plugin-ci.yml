# JellyFetch plugin CI (server-side plugin only) — the DEV/bleeding-edge channel.
#
# CHANNEL MODEL: this workflow is the ROLLING dev channel — it publishes a prerelease on
# the fixed 'plugin-latest' tag on every master push. The STABLE channel is a SEPARATE
# workflow, plugin-release.yml (manual workflow_dispatch, real v<version> tags, accumulating
# gh-pages manifest.json that users subscribe to once). Keep this file as the dev channel;
# do not add stable-release logic here. See AGENTS.md "Distribution & releases".
#
# MONOREPO NOTE (W-042): android/ has a SIBLING workflow, android-ci.yml, owned by
# android-share and path-filtered to android/**. The two workflows share conventions
# (trigger shape, artifact upload, retention, AND the rolling GitHub Release below) —
# if you fix something here that also exists there, mirror the fix in android-ci.yml.
# Specifically, android-ci.yml publishes the equivalent rolling release under tag
# 'android-latest' (this file uses 'plugin-latest'); the two are separate releases by
# design. Keep this file scoped to plugin concerns only.
name: Plugin CI

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Jellyfetch.sln'
      - 'build.sh'
      - 'docs/**'
      - '.github/workflows/plugin-ci.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Jellyfetch.sln'
      - 'build.sh'
      - 'docs/**'
      - '.github/workflows/plugin-ci.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # GITHUB_TOKEN needs contents:write to create/update the rolling release; without
    # it softprops/action-gh-release 403s.
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Runners are ephemeral — provision explicitly. Never rely on preinstalled SDKs
      # or on dev-host paths (/usr/local/dotnet is a local shim, guarded in build.sh).
      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      # JELLYFETCH_LIVE is intentionally NOT set: the 3 live-tool tests
      # (LiveToolTests, network + yt-dlp/svtplay-dl required) self-skip.
      # Expected: 83 passed, 3 skipped.
      - name: Test
        run: dotnet test Jellyfetch.sln --nologo

      - name: Package plugin
        run: ./build.sh

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: jellyfetch-plugin
          path: |
            dist/jellyfetch_*.zip
            dist/manifest.json
          if-no-files-found: error
          retention-days: 30

      # Rolling release: replaces the assets on the fixed 'plugin-latest' tag every
      # master build so the zip + manifest are grabbable from the repo main page.
      # Skipped on pull_request — PRs must never publish releases. action-gh-release
      # moves the tag to this commit and swaps the assets automatically.
      # (Sibling android-ci.yml does the same under 'android-latest' — mirror changes.)
      - name: Publish rolling release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: plugin-latest
          name: JellyFetch Plugin (latest master build)
          body: |
            Rolling development build of the JellyFetch Jellyfin plugin, updated on every
            push to `master`. Assets are replaced in place; the `plugin-latest` tag always
            points at the most recent master commit.

            - `jellyfetch_*.zip` — installable plugin package
            - `manifest.json` — plugin-repository manifest (host it and add as a Jellyfin plugin repo)
          prerelease: true
          files: |
            dist/jellyfetch_*.zip
            dist/manifest.json
