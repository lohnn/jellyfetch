# JellyFetch Android companion app CI (android/ only).
#
# MONOREPO NOTE (W-042): this workflow has a SIBLING, plugin-ci.yml, owned by
# jellyfin-plugin and path-filtered to the plugin's server-side directories. The
# two workflows share conventions (trigger shape, artifact upload, retention,
# AND the rolling GitHub Release below) — if you fix something here that also
# exists there, mirror the fix in plugin-ci.yml. Specifically, plugin-ci.yml
# publishes the equivalent rolling release under tag 'plugin-latest' (this file
# uses 'android-latest'); the two are separate releases by design. Keep this
# file scoped to android/ concerns only.
#
# ARCH NOTE: the two local shims used on the arm64 dev host that authored this
# app — JAVA_HOME=/usr/lib/jvm/java-17-openjdk-arm64 and
# -Pandroid.aapt2FromMavenOverride=/usr/bin/aapt2 — do NOT belong here and must
# never be added. On GitHub's x86-64 ubuntu-latest runners, setup-java supplies
# the correct JDK, and the Maven-published aapt2 (fetched automatically by AGP)
# is x86-64-native, i.e. exactly right for this runner. The override flag would
# point at a binary that doesn't exist on this architecture. android/gradle.properties
# stays host-neutral for the same reason — see the comment block at its end.
#
# A green build here proves the app COMPILES (assembleRelease) and packages a
# signed release APK artifact. It does NOT verify intent-filter behavior (share
# sheets, magnet/.torrent handling) — that requires on-device verification, see
# android/README or the project AGENTS.md verification checklist.
name: Android CI

on:
  push:
    branches: [master]
    paths:
      - 'android/**'
      - '.github/workflows/android-ci.yml'
  pull_request:
    paths:
      - 'android/**'
      - '.github/workflows/android-ci.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: android

jobs:
  build:
    runs-on: ubuntu-latest
    # GITHUB_TOKEN needs contents:write to create/update the rolling release; without
    # it softprops/action-gh-release 403s.
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Runners are ephemeral — provision explicitly rather than relying on
      # whatever happens to be preinstalled. temurin 17 matches this project's
      # compileOptions/kotlinOptions JVM target.
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # No aapt2FromMavenOverride, no JAVA_HOME override: this is the
      # dev-host-shim-free invocation. The Android SDK is preinstalled on
      # ubuntu-latest; AGP resolves the correct (x86-64) aapt2 from Maven
      # itself. If a future SDK/build-tools license prompt ever blocks a
      # clean runner, prefer accepting via the standard
      # android-actions/setup-android step over hand-rolling license files.
      # Pure JVM unit tests (share/UrlExtractor, TorrentSniffer, IntentResolver
      # decision paths, Job.episodeLabel) — no emulator/instrumentation. This
      # proves the intent-resolution LOGIC; it does not replace on-device
      # verification of real intent-filter matching against sender apps, see
      # the checklist in android/README / project AGENTS.md.
      - name: Unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      # Release signing (static keystore, generated once, material lives only in
      # secrets — see AGENTS.md/CI section). Decodes to a path OUTSIDE the repo
      # working tree ($RUNNER_TEMP, cleaned up by the runner after the job) so
      # the keystore bytes are never at risk of being picked up by a later
      # checkout/artifact-upload step. Gated the same way as the publish step
      # below: PRs (including same-repo PRs, matching the existing convention
      # here) skip this, so app/build.gradle.kts's env-var-conditional
      # signingConfig simply falls back to unsigned for PR compile checks —
      # see app/build.gradle.kts for that fallback logic.
      - name: Decode release keystore
        if: github.event_name != 'pull_request'
        run: echo "$JELLYFETCH_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/jellyfetch-release.jks"
        env:
          JELLYFETCH_KEYSTORE_BASE64: ${{ secrets.JELLYFETCH_KEYSTORE_BASE64 }}

      # Passwords/alias travel via env: (never argv) so they never land in a
      # process listing or the step's logged command line (W-036). On PRs the
      # decode step above didn't run, so this keystore path doesn't exist;
      # app/build.gradle.kts's file-existence check then leaves the release
      # buildType unsigned rather than failing configuration — assembleRelease
      # still compile-verifies the release variant on PRs, it's just unsigned
      # and (see below) never published.
      - name: assembleRelease
        run: ./gradlew assembleRelease --stacktrace
        env:
          JELLYFETCH_KEYSTORE_PATH: ${{ runner.temp }}/jellyfetch-release.jks
          JELLYFETCH_KEYSTORE_PASSWORD: ${{ secrets.JELLYFETCH_KEYSTORE_PASSWORD }}
          JELLYFETCH_KEY_ALIAS: ${{ secrets.JELLYFETCH_KEY_ALIAS }}
          JELLYFETCH_KEY_PASSWORD: ${{ secrets.JELLYFETCH_KEY_PASSWORD }}

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: jellyfetch-android-release
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 14

      # Rolling release: replaces the assets on the fixed 'android-latest' tag every
      # master build so the signed release APK is grabbable from the repo main page. Skipped
      # on pull_request — PRs must never publish releases. action-gh-release moves
      # the tag to this commit and swaps the assets automatically. files: is
      # repo-root-relative and NOT affected by defaults.run.working-directory above
      # (that only scopes run: steps, not uses: steps — I-100), hence the android/...
      # path. (Sibling plugin-ci.yml does the same under 'plugin-latest'; mirror
      # changes.)
      - name: Publish rolling release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: JellyFetch Android (latest master build)
          body: |
            Rolling development build of the JellyFetch Android companion app, updated
            on every push to `master`. Assets are replaced in place; the `android-latest`
            tag always points at the most recent master commit.

            - `app-release.apk` — signed release build (static release keystore held in
              GitHub Actions secrets), install via `adb install` or sideload. Signed does
              NOT mean on-device verified — see AGENTS.md for the on-device intent-filter
              verification checklist (share sheets, magnet links, .torrent files).
          prerelease: true
          files: |
            android/app/build/outputs/apk/release/*.apk

  # ---------------------------------------------------------------------------
  # Compose Preview screenshot rendering (the visual oracle).
  #
  # WHY A SEPARATE, DISPATCH-ONLY JOB:
  #   The reference PNGs for the dashboard's @PreviewTest previews are rendered
  #   via layoutlib, which Google ships x86-64-ONLY. This app was authored on an
  #   arm64 dev host where layoutlib CANNOT initialize (upstream Google gap, issue
  #   227219818 — no arm64 layoutlib build exists), so the render cannot happen on
  #   the dev box. GitHub's ubuntu-latest runners ARE x86-64, so layoutlib works
  #   here — this job exists to produce the PNGs the arm64 host can't, and upload
  #   them so a human can actually SEE the rendered fuchsia dashboard.
  #
  #   It is workflow_dispatch-ONLY (not on push/PR) on purpose:
  #     - Rendering pulls the layoutlib data transform + fonts and renders every
  #       preview; it is markedly slower than the compile/unit-test path and adds
  #       nothing to the PR quality gate (the previews already COMPILE on arm64 —
  #       compileDebugScreenshotTestKotlin is green there). Gating it behind a
  #       manual trigger keeps every PR/master push fast while making the oracle
  #       reproducible on demand.
  #     - updateDebugScreenshotTest is a GENERATE/RECORD step (it writes reference
  #       PNGs), not a pass/fail gate. Running it automatically on PRs would blur
  #       "record" with "validate". When a validate gate is wanted later, add a
  #       validateDebugScreenshotTest step to the `build` job instead — that IS a
  #       gate and belongs on PR/push.
  #
  #   NO aapt2FromMavenOverride here: that flag is the arm64 dev-host workaround
  #   (points at /opt/android-sdk/.../aapt2, an arm64 binary). On this x86-64
  #   runner AGP resolves the correct x86-64 aapt2 from Maven itself — adding the
  #   override would break the build. Same rule as the `build` job above.
  render-screenshots:
    # Manual only — see the block above. x86-64 ubuntu-latest is required for
    # layoutlib to initialize.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # JDK 17: AGP/Gradle reject JDK 25 (and the wider new-JDK line); 17 matches
      # the app's compileOptions/kotlinOptions JVM target and the `build` job.
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Provision the exact SDK surface app/build.gradle.kts links against:
      # compileSdk 36 / build-tools 36 / platforms;android-36. The screenshot
      # renderer needs android-36's android.jar + build-tools 36 core-lambda-stubs
      # on its layoutlib classpath (confirmed from the plugin's generated
      # preview_screenshot_config.properties). setup-android provisions the
      # cmdline-tools; sdkmanager below installs the specific packages.
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages (compileSdk 36 / build-tools 36)
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      # layoutlib is a headless native renderer: it initializes AWT/font stacks
      # to rasterize the previews. On a bare ubuntu-latest it can fail render-init
      # for missing native font/graphics libs (freetype/fontconfig + fonts, plus
      # the common X/AWT shared libs libXext/libXrender/libXtst that the JDK's
      # headless AWT still dlopen-links). Install them up front so the very first
      # CI run doesn't die on a "could not initialize the rendering library" that
      # is really a missing-.so. (freetype/fontconfig ship as deps of the -dev/
      # font packages; fonts-dejavu-core gives layoutlib a real font to fall back
      # to instead of rendering blank glyph boxes.)
      - name: Install layoutlib native deps (headless graphics/fonts)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libfreetype6 libfontconfig1 fontconfig fonts-dejavu-core \
            libxext6 libxrender1 libxtst6 libxi6

      # GENERATE the reference PNGs. updateDebugScreenshotTest RENDERS every
      # @PreviewTest preview and writes the reference images. NO aapt2 override
      # (x86-64 runner — see the block above). The upload step below uses
      # `if: always()` so that even if this render step fails, whatever rendered
      # (plus the report/log) is still captured for inspection — this is a
      # record/inspect job, not a pass/fail gate.
      - name: Render reference screenshots (updateDebugScreenshotTest)
        run: ./gradlew :app:updateDebugScreenshotTest --stacktrace

      # Upload BOTH authoritative output locations (paths confirmed from the
      # plugin's own generated preview_screenshot_config.properties):
      #   - referenceImageDir  = app/src/screenshotTestDebug/reference/  (the
      #     durable reference PNGs updateDebugScreenshotTest writes — the point
      #     of this job)
      #   - previewImageOutputDir = build/outputs/screenshotTest-results/preview/
      #     debug/rendered/  (the freshly-rendered images from THIS run — belt &
      #     suspenders, and useful if a run renders but the reference-copy step is
      #     skipped for any reason)
      # if-no-files-found: warn (not error) so a partial/failed render still yields
      # a downloadable artifact with whatever + the report for diagnosis.
      - name: Upload rendered screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jellyfetch-android-screenshots
          path: |
            android/app/src/screenshotTestDebug/reference/**/*.png
            android/app/build/outputs/screenshotTest-results/preview/debug/rendered/**/*.png
          if-no-files-found: warn
          retention-days: 14
